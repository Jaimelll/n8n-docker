services:
  n8n:
    build: .
    user: "root"
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=${URL_NGROK}
      - N8N_PROTOCOL=https
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      
      # 🔥 OCR / archivos grandes
      - EXECUTIONS_PROCESS=main
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_BINARY_DATA_STORAGE_PATH=/data/binary
      - NODES_EXCLUDE=[]
      
      # 🔥 MCP (Ahora es dinámico, por defecto apagado)
      - N8N_MCP_ENABLED=${N8N_MCP_ENABLED:-false}
      - N8N_MCP_URL=${N8N_MCP_URL:-}

    volumes:
      - ${N8N_DATA_PATH:-./n8n_data}:/root/.n8n
      - ${N8N_BINARY_PATH:-./data}:/data

    depends_on:
      - gotenberg
    networks:
      - n8n_network
    env_file:
      - .env

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-timeout=300s"
    ports:
      - "3000:3000"
    networks:
      - n8n_network

  # 🔥 MCP (Se queda en el código, pero solo arranca si el .env lo pide)
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped
    environment:
      - MCP_MODE=http
      - PORT=3001   
      - AUTH_TOKEN=${MCP_AUTH_TOKEN} 
    ports:
      - "3001:3001"
    networks:
      - n8n_network
    profiles:
      - mcp

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    command: http n8n:5678 --domain=${N8N_STATIC_DOMAIN} --host-header=rewrite
    depends_on:
      - n8n
    networks:
      - n8n_network
    env_file:
      - .env

volumes:
  n8n_data:

networks:
  n8n_network:
    driver: bridge