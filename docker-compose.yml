services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=${URL_NGROK}
      - N8N_PROTOCOL=https
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network
    env_file:
      - .env

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    ports:
      - "4040:4040"
    command: http n8n:5678 --domain=${N8N_STATIC_DOMAIN} --host-header=rewrite --log=stdout
    depends_on:
      - n8n
    networks:
      - n8n_network
    env_file:
      - .env

  n8n-mcp:
    image: node:18-slim
    command: sh -c "npm install -g n8n-mcp && n8n-mcp"
    environment:
      - N8N_API_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
    depends_on:
      - n8n
    networks:
      - n8n_network

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    networks:
      - n8n_network

volumes:
  n8n_data:

networks:
  n8n_network:
    driver: bridge